server {
  listen 80;
  server_name secure.aroche.local;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name secure.aroche.local;

  ssl_certificate     /etc/nginx/certs/secure/secure.crt;
  ssl_certificate_key /etc/nginx/certs/secure/secure.key;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;
  ssl_ciphers 'TLS_AES_256_GCM_SHA384:TLS_AES_128_GCM_SHA256:TLS_CHACHA20_POLY1305_SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  root /var/www/secure;
  index index.html;

  location ^~ /_shared/ {
    alias /var/www/_shared/;
  }

  location / {
    try_files $uri $uri/ =404;
  }

  location = /login {
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_pass http://httpbin_upstream/post;
  }
}

