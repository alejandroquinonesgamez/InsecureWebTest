server {
  listen 80;
  server_name insecure.aroche.local insecure.localhost;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name insecure.aroche.local insecure.localhost;

  ssl_certificate     /etc/nginx/certs/insecure/insecure.crt;
  ssl_certificate_key /etc/nginx/certs/insecure/insecure.key;

  # Objetivo educativo: TLS 1.2 + máximo de ciphers compatibles con clientes viejos/nuevos.
  # Con RSA muy pequeño (p. ej. 512), listas manuales suelen dar NO_CYPHER_OVERLAP en Firefox:
  # OpenSSL 3 + clave débil puede no ofrecer lo mismo que el cliente espera.
  ssl_protocols TLSv1.2;
  ssl_prefer_server_ciphers off;
  ssl_ciphers 'DEFAULT:@SECLEVEL=0';
  ssl_ecdh_curve secp256r1:secp384r1;
  ssl_session_cache shared:SSL_INSECURE:10m;
  ssl_session_timeout 10m;

  root /var/www/insecure;
  index index.html;

  location ^~ /_shared/ {
    alias /var/www/_shared/;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /login {
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_pass http://auth_upstream/login;
  }
}

