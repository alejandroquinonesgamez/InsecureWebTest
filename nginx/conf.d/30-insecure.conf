server {
  listen 80;
  server_name insecure.aroche.local insecure.localhost;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name insecure.aroche.local insecure.localhost;

  ssl_certificate     /etc/nginx/certs/insecure/insecure.crt;
  ssl_certificate_key /etc/nginx/certs/insecure/insecure.key;

  # Objetivo educativo: permitir ciphers/protocolos considerados débiles.
  ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
  ssl_prefer_server_ciphers on;
  ssl_ciphers 'ALL:@SECLEVEL=0';
  ssl_session_cache shared:SSL_INSECURE:10m;
  ssl_session_timeout 10m;

  root /var/www/insecure;
  index index.html;

  location ^~ /_shared/ {
    alias /var/www/_shared/;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /login {
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_pass http://auth_upstream/login;
  }
}

