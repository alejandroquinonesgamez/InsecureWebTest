<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>daza-level-security — Login</title>
    <link rel="stylesheet" href="/_shared/login.css" />
  </head>
  <body>
    <div class="wrap">
      <div class="box">
        <h1>daza-level-security — HTTP (very-unsecure)</h1>
        <p>
          Este laboratorio va en <strong>HTTP</strong>. El <code>POST /login</code> (incl. credenciales) viajará en claro.
        </p>
        <form method="post" action="/login" autocomplete="off">
          <label>
            Usuario
            <input name="username" placeholder="usuario" />
          </label>
          <label>
            Contraseña
            <input name="password" type="password" placeholder="••••••••" />
          </label>
          <button type="submit">Entrar</button>
        </form>
        <details class="creds">
          <summary>Credenciales válidas (demo)</summary>
          <div class="panel">
            <span class="pill">User: <code>Manuel</code></span>
            <span class="pill">Password: <code>SierraArocheLove88</code></span>
          </div>
        </details>
        <div class="hint">
          Wireshark: filtra por <code>tcp.port == 80</code> o <code>http</code> y verás el payload.
        </div>
      </div>
    </div>
  </body>
</html>
