<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>insecure — Login</title>
    <link rel="stylesheet" href="/_shared/login.css" />
  </head>
  <body>
    <div class="wrap">
      <div class="box">
        <h1>insecure — HTTPS débil</h1>
        <p>Login de laboratorio para generar tráfico con configuración TLS deliberadamente floja.</p>
        <form method="post" action="/login" autocomplete="off">
          <label>
            Usuario
            <input name="username" placeholder="usuario" />
          </label>
          <label>
            Contraseña
            <input name="password" type="password" placeholder="••••••••" />
          </label>
          <button type="submit">Entrar</button>
        </form>
        <div class="hint">
          Si tu navegador no permite negociar ciphers antiguos, prueba con <code>curl</code> (p. ej. forzando TLS) o ajusta la config TLS del laboratorio.
        </div>
      </div>
    </div>
  </body>
</html>
