<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Sierra de Aroche — Laboratorios TLS</title>
    <style>
      :root { color-scheme: light; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        background: #0b1220;
        color: #111827;
      }
      .hero-bg { min-height: 100vh; }
      .wrap { max-width: 1120px; margin: 0 auto; padding: 24px 18px 56px; }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        color: rgba(255,255,255,.92);
      }
      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
        color: inherit;
        font-weight: 800;
        letter-spacing: .02em;
      }
      .brand .mark {
        width: 34px; height: 34px;
        border-radius: 10px;
        background: rgba(255,255,255,.14);
        border: 1px solid rgba(255,255,255,.22);
        display: grid;
        place-items: center;
        font-size: 15px;
      }
      nav a {
        color: rgba(255,255,255,.92);
        text-decoration: none;
        font-size: 13px;
        padding: 8px 10px;
        border-radius: 999px;
      }
      nav a:hover { background: rgba(255,255,255,.10); }

      .stage {
        position: relative;
        max-width: 1024px;
        margin: 18px auto 0;
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 30px 90px rgba(0,0,0,.55);
        border: 1px solid rgba(255,255,255,.14);
        background: #0b1220;
      }
      .stage::before {
        content: "";
        display: block;
        /* Mantiene la proporción exacta de tu captura: 1024 x 506 */
        padding-top: 49.4140625%;
      }
      .stage img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .hotspot {
        position: absolute;
        display: block;
        border-radius: 12px;
        outline: 0;
        text-decoration: none;
      }
      .hotspot:focus-visible,
      .hotspot:hover {
        box-shadow: 0 0 0 3px rgba(255,255,255,.55), 0 0 0 7px rgba(17, 24, 39, .45);
      }
      .hotspot::after {
        content: attr(data-label);
        position: absolute;
        left: 10px;
        bottom: 10px;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: .02em;
        color: rgba(255,255,255,.95);
        background: rgba(0,0,0,.45);
        border: 1px solid rgba(255,255,255,.25);
        padding: 6px 10px;
        border-radius: 999px;
        opacity: 0;
        transform: translateY(6px);
        transition: opacity .12s ease, transform .12s ease;
        pointer-events: none;
      }
      .hotspot:hover::after,
      .hotspot:focus-visible::after { opacity: 1; transform: translateY(0); }

      /* Coordenadas en % (respecto a la imagen 1024x506). Ajustables si cambias la portada. */
      .hs-castillo { left: 13.0%; top: 33.6%; width: 23.5%; height: 46.5%; }
      .hs-cobertizo { left: 38.3%; top: 33.6%; width: 23.5%; height: 46.5%; }
      .hs-cueva { left: 63.6%; top: 33.6%; width: 23.5%; height: 46.5%; }

      footer { margin-top: 16px; text-align: center; font-size: 12px; color: rgba(255,255,255,.82); }
      code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      @media (max-width: 900px) {
        nav a { padding: 8px 8px; }
      }
    </style>
  </head>
  <body>
    <div class="hero-bg">
      <div class="wrap">
        <header class="topbar">
          <a class="brand" href="/">
            <span class="mark">SA</span>
            <span>SIERRA DE AROCHE</span>
          </a>
          <nav aria-label="Navegación">
            <a href="#labs">Laboratorios</a>
            <a href="https://secure.localhost/">Secure</a>
            <a href="https://insecure.localhost/">Insecure</a>
            <a href="http://daza-level-security.localhost/">HTTP</a>
          </nav>
        </header>

        <section id="labs" class="stage" aria-label="Portada con accesos a laboratorios">
          <img src="/assets/portada.png" alt="Sierra de Aroche — portada" />

          <a class="hotspot hs-castillo" href="https://secure.localhost/" data-label="secure (HTTPS bueno)" aria-label="Abrir secure (HTTPS bueno)"></a>
          <a class="hotspot hs-cobertizo" href="https://insecure.localhost/" data-label="insecure (HTTPS débil)" aria-label="Abrir insecure (HTTPS débil)"></a>
          <a class="hotspot hs-cueva" href="http://daza-level-security.localhost/" data-label="HTTP (very-unsecure)" aria-label="Abrir HTTP (very-unsecure)"></a>
        </section>

        <footer>
          Accede sin tocar <code>/etc/hosts</code> usando <code>secure.localhost</code>, <code>insecure.localhost</code> y <code>daza-level-security.localhost</code>.
        </footer>
      </div>
    </div>
  </body>
</html>
