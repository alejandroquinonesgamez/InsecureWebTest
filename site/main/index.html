<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Sierra de Aroche — Laboratorios TLS</title>
    <style>
      :root { color-scheme: light; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        background: #0b1220;
        color: #111827;
      }
      .hero-bg { min-height: 100vh; }
      .wrap { max-width: 1120px; margin: 0 auto; padding: 24px 18px 56px; }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        color: rgba(255,255,255,.92);
      }
      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
        color: inherit;
        font-weight: 800;
        letter-spacing: .02em;
      }
      .brand .mark {
        width: 34px; height: 34px;
        border-radius: 10px;
        background: rgba(255,255,255,.14);
        border: 1px solid rgba(255,255,255,.22);
        display: grid;
        place-items: center;
        font-size: 15px;
      }
      nav a {
        color: rgba(255,255,255,.92);
        text-decoration: none;
        font-size: 13px;
        padding: 8px 10px;
        border-radius: 999px;
      }
      nav a:hover { background: rgba(255,255,255,.10); }

      .stage {
        position: relative;
        max-width: 1024px;
        margin: 18px auto 0;
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 30px 90px rgba(0,0,0,.55);
        border: 1px solid rgba(255,255,255,.14);
        background: #0b1220;
      }
      .stage::before {
        content: "";
        display: block;
        /* Mantiene la proporción exacta de tu captura: 1024 x 506 */
        padding-top: 49.4140625%;
      }
      .stage > img.bg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .stage-title {
        position: absolute;
        left: 50%;
        top: 12%;
        transform: translateX(-50%);
        text-align: center;
        color: rgba(255,255,255,.96);
        text-shadow: 0 10px 24px rgba(0,0,0,.55);
        pointer-events: none;
        padding: 0 16px;
      }
      .stage-title h1 {
        margin: 0;
        font-size: 42px;
        letter-spacing: -0.02em;
        text-transform: uppercase;
      }
      .frames {
        position: absolute;
        left: 50%;
        top: 32%;
        transform: translateX(-50%);
        width: min(92%, 980px);
        display: flex;
        justify-content: center;
        gap: clamp(10px, 2.2vw, 18px);
      }
      .frame {
        position: relative;
        flex: 1 1 0;
        max-width: 300px;
        min-width: 200px;
        display: block;
        text-decoration: none;
        outline: 0;
        transition: transform .12s ease, filter .12s ease, border-color .12s ease;
        filter: drop-shadow(0 24px 45px rgba(0,0,0,.50));
        border-radius: 14px;
        border: 4px solid rgba(255,255,255,.78);
        box-shadow: 0 0 0 1px rgba(0,0,0,.35) inset;
        background: rgba(0,0,0,.20);
        overflow: hidden;
      }
      .frame img {
        width: 100%;
        height: auto;
        display: block;
      }
      .frame:hover,
      .frame:focus-visible {
        transform: translateY(-2px) scale(1.01);
        filter: drop-shadow(0 30px 65px rgba(0,0,0,.60));
        border-color: rgba(255,255,255,.90);
      }
      .frame:focus-visible {
        box-shadow: 0 0 0 3px rgba(255,255,255,.55), 0 0 0 7px rgba(17, 24, 39, .45), 0 0 0 1px rgba(0,0,0,.35) inset;
      }
      .frame .label {
        position: absolute;
        left: 12px;
        top: 12px;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 900;
        letter-spacing: .02em;
        color: rgba(255,255,255,.96);
        background: rgba(0,0,0,.45);
        border: 1px solid rgba(255,255,255,.28);
        backdrop-filter: blur(6px);
        pointer-events: none;
      }
      .frame .caption {
        display: block;
        padding: 10px 12px 12px;
        font-size: 14px;
        font-weight: 900;
        letter-spacing: .02em;
        text-transform: uppercase;
        color: rgba(255,255,255,.94);
        background: rgba(0,0,0,.30);
        border-top: 1px solid rgba(255,255,255,.14);
      }

      footer { margin-top: 16px; text-align: center; font-size: 12px; color: rgba(255,255,255,.82); }
      code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      @media (max-width: 900px) {
        nav a { padding: 8px 8px; }
      }
      @media (max-width: 760px) {
        .stage-title { top: 8%; }
        .stage-title h1 { font-size: 30px; }
        .stage {
          overflow: visible;
        }
        .stage::before { display: none; }
        .stage > img.bg {
          position: static;
          width: 100%;
          height: auto;
          display: block;
        }
        .frames {
          position: static;
          transform: none;
          width: 100%;
          padding: 12px 12px 14px;
          margin: -6px auto 0;
          flex-direction: column;
          align-items: center;
        }
        .frame {
          width: min(78%, 340px);
          max-width: none;
          min-width: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="hero-bg">
      <div class="wrap">
        <header class="topbar">
          <a class="brand" href="/">
            <span class="mark">SA</span>
            <span>SIERRA DE AROCHE</span>
          </a>
          <nav aria-label="Navegación">
            <a href="#labs">Laboratorios</a>
            <a href="https://secure.localhost/">Secure</a>
            <a href="https://insecure.localhost/">Insecure</a>
            <a href="http://daza-level-security.localhost/">HTTP</a>
          </nav>
        </header>

        <section id="labs" class="stage" aria-label="Portada con accesos a laboratorios">
          <img class="bg" src="/assets/portada-limpia.png" alt="Sierra de Aroche — portada" />
          <div class="stage-title" aria-hidden="true">
            <h1>Explora la Sierra de Aroche</h1>
          </div>

          <div class="frames" aria-label="Accesos a laboratorios">
            <a class="frame" href="https://secure.localhost/" aria-label="Abrir secure (HTTPS bueno)">
              <span class="label">SECURE · HTTPS bueno</span>
              <img src="/assets/frame-castillo.png" alt="El castillo de Aroche (secure)" />
              <span class="caption">Secure</span>
            </a>
            <a class="frame" href="https://insecure.localhost/" aria-label="Abrir insecure (HTTPS débil)">
              <span class="label">INSECURE · HTTPS débil</span>
              <img src="/assets/frame-cobertizo.png" alt="Cobertizo antiguo (insecure)" />
              <span class="caption">Insecure</span>
            </a>
            <a class="frame" href="http://daza-level-security.localhost/" aria-label="Abrir HTTP (very-unsecure)">
              <span class="label">DAZA · HTTP en claro</span>
              <img src="/assets/frame-cueva.png" alt="Entrada a una cueva (HTTP)" />
              <span class="caption">Daza-Style</span>
            </a>
          </div>
        </section>

        <footer>
          Accede sin tocar <code>/etc/hosts</code> usando <code>secure.localhost</code>, <code>insecure.localhost</code> y <code>daza-level-security.localhost</code>.
        </footer>
      </div>
    </div>
  </body>
</html>
